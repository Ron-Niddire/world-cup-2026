const DEFAULT_FAV="Scotland";
let FAV=DEFAULT_FAV;
try{FAV=localStorage.getItem("wc26-fav")||DEFAULT_FAV;}catch(e){}
const favFlag=()=>FLAGS[FAV]||"⚽";
function applyFav(){
  F.forEach(m=>{m.qatar=m.ko_known&&(key(m.h)===key(FAV)||key(m.a)===key(FAV));});
  const b=document.getElementById("favBtn");
  if(b)b.textContent=`${favFlag()} ${FAV} ▾`;
}
function openPicker(){
  const teams=[...new Set(F.filter(m=>m.ko_known).flatMap(m=>[m.h,m.a]))].sort((a,b)=>a.localeCompare(b));
  const ov=document.createElement("div");ov.className="picker-ov";
  ov.innerHTML=`<div class="picker"><div class="ptitle">Pick your team</div><div class="pgrid">${
    teams.map(t=>`<button class="pteam${t===FAV?" sel":""}" data-t="${t}">${FLAGS[t]||"⚽"} ${t}</button>`).join("")
  }</div></div>`;
  ov.addEventListener("click",e=>{
    if(e.target===ov){ov.remove();return;}
    const b=e.target.closest(".pteam");if(!b)return;
    FAV=b.dataset.t;
    try{localStorage.setItem("wc26-fav",FAV);}catch(err){}
    applyFav();render();ov.remove();
  });
  document.body.appendChild(ov);
}
applyFav();

const WC_LEAGUE_ID = 4429; // FIFA World Cup on TheSportsDB

function absorbEvent(ev){
  if(!/world cup/i.test(ev.strLeague||"")) return 0;
  const hk=key(ev.strHomeTeam), ak=key(ev.strAwayTeam);
  const ts=Date.parse((ev.strTimestamp||ev.dateEvent+"T"+(ev.strTime||"00:00:00"))+ (ev.strTimestamp?"":"Z"));
  let m=F.find(x=>x.ko_known && key(x.h)===hk && key(x.a)===ak);
  if(!m && !isNaN(ts)){
    // fuzzy: same kick-off window and at least one team name recognised (either side)
    const c=F.filter(x=>x.ko_known && Math.abs(x.ko.getTime()-ts)<45*60000 &&
      (key(x.h)===hk||key(x.a)===ak||key(x.h)===ak||key(x.a)===hk));
    if(c.length===1) m=c[0];
  }
  if(!m && !isNaN(ts)){
    // knockout fixture? match TBD slots by kick-off time (+ city if two games share a slot)
    const cands=F.filter(x=>!x.ko_known && Math.abs(x.ko.getTime()-ts)<45*60000);
    if(cands.length===1) m=cands[0];
    else if(cands.length>1){
      const vn=norm(ev.strVenue||"");
      m=cands.find(x=>vn && (vn.includes(norm(x.c))||norm(x.v).includes(vn)));
    }
    if(m){ m.h=ev.strHomeTeam; m.a=ev.strAwayTeam; m.ko_known=true;
           m.qatar=(key(m.h)===key(FAV)||key(m.a)===key(FAV)); }
  }
  if(!m) return 0;
  if(ev.intHomeScore!=null&&ev.intHomeScore!==""){
    const swapped=(key(m.h)===ak && key(m.a)===hk);
    scores[m.i]={hs:swapped?ev.intAwayScore:ev.intHomeScore,
                 as:swapped?ev.intHomeScore:ev.intAwayScore,
                 status:ev.strStatus||ev.strProgress||"",min:ev.strProgress||""};
    return 1;
  }
  return 0;
}

let seasonLoadedAt=0;
function fetchT(url,ms=10000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);
  return fetch(url,{cache:"no-store",signal:c.signal}).finally(()=>clearTimeout(t));}
async function pullScores(){
  const feed=document.getElementById("feed");
  let got=0, ok=false;

  // 1) season-wide results (all played matches keep their scores) — refresh every 10 min
  if(Date.now()-seasonLoadedAt>10*60000){
    try{
      const res=await fetchT(`https://www.thesportsdb.com/api/v1/json/${KEY}/eventsseason.php?id=${WC_LEAGUE_ID}&s=2026`);
      if(res.ok){const data=await res.json(); ok=true; seasonLoadedAt=Date.now();
        (data.events||[]).forEach(ev=>{got+=absorbEvent(ev);});}
    }catch(e){}
  }

  // 2) today's feed for the freshest in-play scores
  for(let off=-1;off<=0;off++){
    const d=new Date(Date.now()+off*864e5).toISOString().slice(0,10);
    try{
      const res=await fetchT(`https://www.thesportsdb.com/api/v1/json/${KEY}/eventsday.php?d=${d}&s=Soccer`);
      if(!res.ok) continue;
      const data=await res.json(); ok=true;
      (data.events||[]).forEach(ev=>{got+=absorbEvent(ev);});
    }catch(e){ /* offline — degrade quietly */ }
  }

  const total=Object.keys(scores).length;
  if(ok){feed.className="feed ok";feed.querySelector("span").textContent=
      `Live feed connected · ${total} score${total===1?"":"s"} loaded · updates every ${SCORE_REFRESH_MS/1000}s`+(PREMIUM_KEY?" · premium":"");}
  else{feed.className="feed err";feed.querySelector("span").textContent=
      "No live feed right now — schedule & countdowns still work offline.";}
  render();
}

/* ---------- rendering ---------- */
let filter="all";
function nextMatch(qatarOnly){
  const now=Date.now();
  return F.filter(m=>(!qatarOnly||m.qatar)&&m.ko.getTime()+LIVE_WINDOW_MIN*60000>now)
          .sort((a,b)=>a.ko-b.ko)[0];
}
function liveNow(){return F.filter(m=>statusOf(m)==="live").sort((a,b)=>a.ko-b.ko);}

function scoreStr(m){const s=scores[m.i];return s?`${s.hs}–${s.as}`:null;}

function renderRail(){
  const rail=document.getElementById("rail");
  const lives=liveNow();
  if(lives.length){
    const m=lives[0], s=scores[m.i];
    rail.className="rail islive";
    rail.innerHTML=`<div class="top"><span class="live-dot"><i></i>Live now</span>
      ${m.qatar?'<span class="qchip">'+FAV+'</span>':`<span class="badge">Group ${m.g}</span>`}</div>
      <div class="match">
        <div class="teams">${m.h} <span style="color:var(--faint)">v</span> ${m.a}
          <div class="meta">${m.v} · ${m.c}${lives.length>1?` &nbsp;·&nbsp; +${lives.length-1} more live`:""}</div></div>
        <div class="score">${s?`${s.hs}–${s.as}`:'– –'}<span class="min">${s&&s.min?s.min:'LIVE'}</span></div>
      </div>`;
    return;
  }
  // otherwise: next kick-off countdown
  const m=nextMatch(false);
  rail.className="rail";
  if(!m){rail.innerHTML='<div class="top"><span class="badge">Tournament complete</span></div><div class="match"><div class="teams">🏆 See you in 2030</div></div>';return;}
  const diff=m.ko.getTime()-Date.now();
  const cd=fmtCountdown(diff);
  const qn=nextMatch(true);
  const sameQ=qn&&qn.i===m.i;
  rail.innerHTML=`<div class="top"><span class="badge">Next kick-off</span>
      ${m.qatar?'<span class="qchip">'+favFlag()+' '+FAV+'</span>':`<span class="badge">${m.ko_known?'Group '+m.g:STAGE_LABEL[m.g]}</span>`}</div>
    <div class="countdown tnum ${m.qatar?'q':''}">${cd}</div>
    <div class="match"><div class="teams">${m.ko_known?`${m.h} <span style="color:var(--faint)">v</span> ${m.a}`:STAGE_LABEL[m.g]}
      <div class="meta">${dohaTime(m.ko)} · ${m.v} · ${m.c}</div>
      ${(!sameQ&&qn)?`<div class="meta" style="margin-top:6px;color:var(--qatar-ink)">${favFlag()} Next ${FAV}: ${qn.h} v ${qn.a} · ${dohaDayLong(qn.ko)} ${dohaTime(qn.ko)}</div>`:""}
    </div></div>`;
}
function fmtCountdown(ms){
  if(ms<0)ms=0; let s=Math.floor(ms/1000);
  const d=Math.floor(s/86400);s-=d*86400;
  const h=Math.floor(s/3600);s-=h*3600;
  const mn=Math.floor(s/60);s-=mn*60;
  const p=n=>String(n).padStart(2,"0");
  return (d>0?`${d}d `:"")+`${p(h)}:${p(mn)}:${p(s)}`;
}

function render(){
  renderRail();
  const list=document.getElementById("list");
  const now=Date.now();
  let items=F.slice();
  if(filter==="qatar")items=items.filter(m=>m.qatar);
  if(filter==="today"){const tk=dohaDayKey(new Date());items=items.filter(m=>dohaDayKey(m.ko)===tk);}
  if(filter==="live")items=items.filter(m=>statusOf(m)==="live");
  items.sort((a,b)=>a.ko-b.ko);

  if(!items.length){list.innerHTML=`<div class="empty">No matches ${filter==="live"?"live right now":filter==="today"?"today (Doha date)":"to show"}.</div>`;return;}
  let html="", curDay="";
  items.forEach(m=>{
    const dk=dohaDayKey(m.ko);
    if(dk!==curDay){curDay=dk;
      const cnt=items.filter(x=>dohaDayKey(x.ko)===dk).length;
      html+=`<div class="day">${dohaDayLong(m.ko)}<span class="n">${cnt} match${cnt===1?"":"es"}</span></div>`;}
    const st=statusOf(m), sc=scoreStr(m);
    const stage=m.ko_known?`Group ${m.g}`:STAGE_LABEL[m.g];
    const grpCls=m.ko_known?"grp":"grp ko";
    const pill = st==="live"?`<span class="pill live">Live</span>`
              : st==="fin"?`<span class="pill ft">FT</span>`
              : "";
    let center;
    if(m.ko_known){
      center = sc
        ? `<span>${m.qatar?'<span class="flag">'+favFlag()+'</span> ':''}${m.h}</span> <span class="sc">${sc}</span> <span>${m.a}</span>`
        : `<span>${m.qatar?'<span class="flag">'+favFlag()+'</span> ':''}${m.h}</span> <span class="vs">v</span> <span>${m.a}</span>`;
    }else{
      center = `<span style="color:var(--gold)">${stage}</span>`;
    }
    html+=`<div class="m ${m.qatar?'q':''} ${st==='live'?'live':''} ${st==='fin'?'fin':''}">
      <div class="time">${dohaTime(m.ko)}<span class="ko">${st==='soon'?'KO':st==='live'?'• now':'done'}</span></div>
      <div class="body"><div class="tline">${center}</div>
        <div class="place">📍 ${m.v} <span class="city">· ${m.c}</span></div></div>
      <div class="right"><span class="${grpCls}">${m.ko_known?'Grp '+m.g:m.g}</span>${pill}</div>
    </div>`;
  });
  list.innerHTML=html;
}

/* ---------- clock + countdown ticking ---------- */
function tick(){
  document.getElementById("clock").textContent=
    new Intl.DateTimeFormat("en-GB",{timeZone:TZ,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(new Date());
  renderRail(); // keep countdown live to the second
}
setInterval(tick,1000); tick();
/* header logo: reuse the embedded touch-icon data URI */
document.getElementById("applogo").src=document.querySelector('link[rel="apple-touch-icon"]').href;
/* show the detected zone in the header */
(function(){
  const city=(TZ.split("/").pop()||TZ).replace(/_/g," ");
  document.getElementById("tzCity").textContent=city;
  try{
    const abbr=new Intl.DateTimeFormat("en-GB",{timeZone:TZ,timeZoneName:"short"})
      .formatToParts(new Date()).find(p=>p.type==="timeZoneName").value;
    document.getElementById("tzLabel").textContent=city+" · "+abbr;
  }catch(e){document.getElementById("tzLabel").textContent=city;}
})();
setInterval(render,30000);            // refresh statuses
pullScores(); setInterval(pullScores,SCORE_REFRESH_MS);

/* ---------- update notifier ---------- */
let pageTag=null;
async function checkUpdate(){
  if(!/^https?:/.test(location.protocol)) return;     // skip when opened as a local file
  try{
    const r=await fetch(location.href,{method:"HEAD",cache:"no-store"});
    const tag=r.headers.get("etag")||r.headers.get("last-modified");
    if(!tag) return;
    if(pageTag===null){pageTag=tag;return;}            // remember the version we're running
    if(tag!==pageTag&&!document.getElementById("updbar")){
      const b=document.createElement("div");b.id="updbar";
      b.textContent="⚽ App updated — tap to reload";
      b.onclick=()=>location.reload();
      document.body.appendChild(b);
    }
  }catch(e){}
}
checkUpdate(); setInterval(checkUpdate,5*60000);
document.addEventListener("visibilitychange",()=>{if(!document.hidden)checkUpdate();});

/* ---------- filters ---------- */
document.querySelectorAll(".filters button").forEach(b=>{
  b.onclick=()=>{
    if(b.dataset.f==="qatar"&&filter==="qatar"){openPicker();return;}
    document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");filter=b.dataset.f;render();
    if(filter!=="live")window.scrollTo({top:document.querySelector(".filters").offsetTop-8,behavior:"instant"});};
});

render();

window.addEventListener("load",()=>{
  setTimeout(()=>{const tk=dohaDayKey(new Date());
    const days=[...document.querySelectorAll(".day")];
    const t=days.find(d=>true); // list already chronological; today header scroll
  },300);
});
